# Sentry self-hosted — démarrage à la demande
#
# Prérequis :
#   1. git clone https://github.com/getsentry/self-hosted.git sentry/
#   2. cd sentry && ./install.sh
#   3. Le réseau 'app' doit exister : docker compose up -d
#
# Démarrage :
#   docker compose -f docker-compose.sentry.yml up -d
#
# Accès Sentry : http://localhost:9000
# DSN : créer un projet dans l'UI, copier le DSN dans .env → SENTRY_DSN
#
# Note : nécessite Docker Compose v2.20+

include:
  - path: ./sentry/docker-compose.yml

# Connecte le service web de Sentry au réseau applicatif
# pour que le SDK Symfony puisse envoyer les événements en interne.
services:
  web:
    networks:
      - app

networks:
  app:
    external: true
